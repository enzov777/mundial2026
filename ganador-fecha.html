const getFlagHTML = (team) => {
    const code = countryCodes[team] || 'xx';
    const fallback = team.substring(0, 2).toUpperCase();
    return `<div class="flag-box" style="background: linear-gradient(135deg, #1e3a5f, #0f172a);"><img src="https://flagcdn.com/w80/${code}.png" alt="${team}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" loading="lazy"><span class="flag-fallback" style="display:none;">${fallback}</span></div>`;
};

const calculatePoints = (betHome, betAway, realHome, realAway) => {
    if (betHome === realHome && betAway === realAway) return { points: 5, reason: "Resultado exacto" };
    const betDiff = betHome - betAway; const realDiff = realHome - realAway;
    if (betDiff === realDiff && betDiff !== 0) return { points: 3, reason: "Diferencia de goles" };
    if (betDiff === 0 && realDiff === 0) return { points: 2, reason: "Empate correcto" };
    const betWinner = betHome > betAway ? 'home' : betHome < betAway ? 'away' : 'draw';
    const realWinner = realHome > realAway ? 'home' : realHome < realAway ? 'away' : 'draw';
    if (betWinner === realWinner && betWinner !== 'draw') return { points: 2, reason: "Ganador correcto" };
    return { points: 0, reason: "Sin acierto" };
};

const getPointsClass = (points) => { if (points === 5) return 'points-5'; if (points === 3) return 'points-3'; if (points === 2) return 'points-2'; return 'points-0'; };

let allMatches = []; let allPlayers = []; let allBets = []; let allPayments = []; let allFees = []; let selectedDate = null;

function getFeeForDate(dateStr) { const date = dateStr.split('T')[0]; const fee = allFees.find(f => f.match_date === date); if (fee && fee.is_free) return { amount: 0, isFree: true, notes: fee.notes }; if (fee) return { amount: fee.amount, isFree: false, notes: fee.notes }; return { amount: 5.00, isFree: false, notes: 'Valor por defecto' }; }

function hasVerifiedPayment(playerId, matchDateStr) {
    const date = matchDateStr.split('T')[0];
    const fee = getFeeForDate(matchDateStr);
    if (fee.isFree) return true;
    const payment = allPayments.find(p => p.player_id === playerId && p.match_date === date && p.status === 'paid' && p.verified_at !== null && p.verified_at !== undefined);
    return !!payment;
}

function getBoliviaDateKey(dateStr) { const date = new Date(dateStr); const boliviaDate = new Date(date.toLocaleString('en-US', { timeZone: 'America/La_Paz' })); return `${boliviaDate.getFullYear()}-${String(boliviaDate.getMonth()+1).padStart(2,'0')}-${String(boliviaDate.getDate()).padStart(2,'0')}`; }

async function loadData() {
    const container = document.getElementById('winnersContainer');
    try {
        const { data: matchesData, error: matchesError } = await sb.from('matches').select('*').eq('status', 'finished').order('match_date');
        if (matchesError) throw matchesError;
        const { data: playersData, error: playersError } = await sb.from('players').select('*');
        if (playersError) throw playersError;
        const { data: betsData, error: betsError } = await sb.from('bets').select('*');
        if (betsError) throw betsError;
        const { data: paymentsData } = await sb.from('payments').select('*');
        const { data: feesData } = await sb.from('payment_fees').select('*');
        renderWinners(matchesData || [], playersData || [], betsData || [], paymentsData || [], feesData || []);
    } catch (error) {
        console.error('Error cargando datos:', error);
        container.innerHTML = `<div class="glass rounded-2xl p-8 text-center text-red-400"><p class="text-lg font-bold mb-2">Error al cargar los datos</p><p class="text-sm text-gray-400">${error.message}</p></div>`;
    }
}

function renderWinners(matches, players, bets, payments, fees) {
    allMatches = matches; allPlayers = players; allBets = bets; allPayments = payments; allFees = fees;
    const container = document.getElementById('winnersContainer');
    if (!matches.length) { container.innerHTML = `<div class="glass rounded-2xl p-12 text-center"><div class="text-5xl mb-4">&#128235;</div><p class="text-gray-400 text-lg">Aun no hay fechas finalizadas para evaluar.</p></div>`; return; }

    const grouped = {}; matches.forEach(m => { const dateKey = getBoliviaDateKey(m.match_date); if (!grouped[dateKey]) grouped[dateKey] = []; grouped[dateKey].push(m); });
    const sortedDates = Object.keys(grouped).sort().reverse(); // Mas recientes primero
    if (!selectedDate) selectedDate = sortedDates[0];

    renderDateFilters(sortedDates, grouped);
    renderDateWinners(selectedDate, grouped[selectedDate], players, bets, payments);
}

function renderDateFilters(dates, grouped) {
    const container = document.getElementById('dateFilters');
    const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
    container.innerHTML = dates.map(date => {
        const [year, month, day] = date.split('-');
        const label = `${parseInt(day)} ${months[parseInt(month)-1]}`;
        const count = grouped[date].length;
        const isActive = date === selectedDate;
        const fee = getFeeForDate(date);
        return `<button onclick="selectDate('${date}')" class="px-4 py-2 rounded-xl text-sm font-semibold transition-all duration-200 border ${isActive ? 'bg-yellow-500 text-black border-yellow-500 shadow-lg shadow-yellow-500/20' : 'bg-gray-800/50 text-gray-400 border-white/10 hover:bg-gray-700/50 hover:text-white'}" title="${count} partido${count > 1 ? 's' : ''}">${label} ${fee.isFree ? '<span class="ml-1 text-[10px] bg-green-500 text-white px-1 rounded">LIBRE</span>' : fee.amount !== 5 ? `<span class="ml-1 text-[10px] bg-orange-500 text-white px-1 rounded">${fee.amount}Bs</span>` : ''}<span class="ml-1 text-xs opacity-70">(${count})</span></button>`;
    }).join('');
}

function selectDate(date) { selectedDate = date; renderDateWinners(date, allMatches.filter(m => getBoliviaDateKey(m.match_date) === date), allPlayers, allBets, allPayments); renderDateFilters(Object.keys(allMatches.reduce((g, m) => { const dk = getBoliviaDateKey(m.match_date); if (!g[dk]) g[dk] = []; g[dk].push(m); return g; }, {})).sort().reverse(), allMatches.reduce((g, m) => { const dk = getBoliviaDateKey(m.match_date); if (!g[dk]) g[dk] = []; g[dk].push(m); return g; }, {})); }

function renderDateWinners(date, dateMatches, players, bets, payments) {
    const container = document.getElementById('winnersContainer');
    const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const formatDateNice = (dateStr) => { const [year, month, day] = dateStr.split('-'); return `${parseInt(day)} de ${months[parseInt(month)-1]} ${year}`; };

    const fee = getFeeForDate(date);
    const verifiedCount = players.filter(p => {
        const payment = payments.find(pay => pay.player_id === p.id && pay.match_date === date && pay.status === 'paid' && pay.verified_at);
        return !!payment;
    }).length;
    const totalPlayers = players.length;
    const totalCollected = verifiedCount * fee.amount;
    const prizePool = fee.isFree ? 0 : totalCollected * 0.8;
    const accumulated = fee.isFree ? 0 : totalCollected * 0.2;

    // Calcular puntos de los jugadores (solo verificados suman puntos)
    const datePlayerScores = players.map(player => {
        let totalPoints = 0;
        let exactos = 0;
        let partidosJugados = 0;
        let results = [];
        const isVerified = hasVerifiedPayment(player.id, date);

        dateMatches.forEach(match => {
            const bet = bets.find(b => b.player_id === player.id && b.match_id === match.id);
            if (bet) {
                partidosJugados++;
                if (isVerified) {
                    const result = calculatePoints(bet.home_prediction, bet.away_prediction, match.home_score, match.away_score);
                    totalPoints += result.points;
                    if (result.points === 5) exactos++;
                    results.push({
                        match: `${match.home_team} vs ${match.away_team}`,
                        prediction: `${bet.home_prediction}-${bet.away_prediction}`,
                        result: `${match.home_score}-${match.away_score}`,
                        points: result.points,
                        reason: result.reason
                    });
                } else {
                    results.push({
                        match: `${match.home_team} vs ${match.away_team}`,
                        prediction: `${bet.home_prediction}-${bet.away_prediction}`,
                        result: `${match.home_score}-${match.away_score}`,
                        points: 0,
                        reason: 'Pago no verificado'
                    });
                }
            } else {
                results.push({
                    match: `${match.home_team} vs ${match.away_team}`,
                    prediction: '-',
                    result: `${match.home_score}-${match.away_score}`,
                    points: 0,
                    reason: 'Sin pronóstico'
                });
            }
        });

        return { 
            id: player.id,
            name: player.name, 
            initials: player.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase(),
            totalPoints, 
            exactos, 
            partidosJugados,
            results,
            isVerified
        };
    }).sort((a, b) => b.totalPoints - a.totalPoints);

    const maxDatePoints = Math.max(...datePlayerScores.filter(p => p.isVerified).map(p => p.totalPoints), 0);
    const winners = datePlayerScores.filter(p => p.totalPoints === maxDatePoints && p.totalPoints > 0 && p.isVerified);
    const nonWinners = datePlayerScores.filter(p => p.totalPoints < maxDatePoints || !p.isVerified);

    let html = `<div class="mb-8">`;

    // Header de la fecha
    html += `
    <div class="glass rounded-2xl p-6 mb-6">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-4">
            <div>
                <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                    <span class="text-3xl">&#128197;</span> ${formatDateNice(date)}
                </h2>
                <p class="text-gray-400 text-sm mt-1">${dateMatches.length} partido${dateMatches.length > 1 ? 's' : ''} finalizado${dateMatches.length > 1 ? 's' : ''}</p>
            </div>
            <div class="flex flex-wrap gap-2">
                ${fee.isFree ? '<span class="free-date px-4 py-2 rounded-full text-sm font-bold text-green-400">&#127381; FECHA LIBRE</span>' : `
                <span class="winner-card px-4 py-2 rounded-full text-sm font-bold text-yellow-400">&#128176; ${totalCollected.toFixed(2)} Bs recaudados</span>
                <span class="winner-card px-4 py-2 rounded-full text-sm font-bold text-green-400">&#127942; ${prizePool.toFixed(2)} Bs premio</span>
                <span class="bg-indigo-500/20 text-indigo-400 px-4 py-2 rounded-full text-sm font-bold">&#127919; ${accumulated.toFixed(2)} Bs acumulado</span>
                `}
            </div>
        </div>

        <div class="flex items-center gap-4 text-sm text-gray-400">
            <span>&#128100; ${totalPlayers} jugadores</span>
            <span>|</span>
            <span>&#9989; ${verifiedCount} pagos verificados</span>
            ${!fee.isFree ? `<span>|</span><span>&#128176; ${fee.amount} Bs por jugador</span>` : ''}
        </div>
    </div>`;

    // Ganadores
    if (winners.length > 0) {
        const prizePerWinner = winners.length > 0 ? (prizePool / winners.length).toFixed(2) : 0;

        html += `
        <div class="winner-card rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <span class="text-4xl">&#127942;</span>
                <div>
                    <h3 class="text-xl font-black text-yellow-400">Ganador${winners.length > 1 ? 'es' : ''} de la Fecha</h3>
                    <p class="text-gray-400 text-sm">${winners.length > 1 ? 'Empate entre ' + winners.length + ' jugadores' : 'Unico ganador'}</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-${Math.min(winners.length, 3)} gap-4">
                ${winners.map((w, i) => `
                <div class="bg-white/5 rounded-xl p-4 border border-yellow-500/20">
                    <div class="flex items-center gap-3 mb-3">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-500 to-amber-600 flex items-center justify-center text-lg font-bold text-white">${w.initials}</div>
                        <div>
                            <div class="font-bold text-white text-lg">${w.name}</div>
                            <div class="text-yellow-400 font-bold">${w.totalPoints} puntos</div>
                        </div>
                        ${winners.length > 1 ? `<div class="ml-auto text-2xl font-black text-yellow-400">#${i+1}</div>` : ''}
                    </div>
                    <div class="flex gap-2 text-xs text-gray-400 mb-3">
                        <span class="bg-white/5 px-2 py-1 rounded">${w.exactos} exactos</span>
                        <span class="bg-white/5 px-2 py-1 rounded">${w.partidosJugados}/${dateMatches.length} pronosticados</span>
                        <span class="bg-green-500/20 text-green-400 px-2 py-1 rounded">&#9989; Verificado</span>
                    </div>
                    ${!fee.isFree ? `<div class="bg-green-500/20 text-green-400 text-center py-2 rounded-lg font-bold">&#128176; ${prizePerWinner} Bs</div>` : '<div class="bg-green-500/20 text-green-400 text-center py-2 rounded-lg font-bold">&#127381; Fecha libre</div>'}
                </div>
                `).join('')}
            </div>
        </div>`;
    }

    // Tabla de todos los jugadores
    html += `
    <div class="glass rounded-2xl p-6">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">&#128202; Puntajes de la Fecha</h3>
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead>
                    <tr class="text-gray-400 text-xs uppercase tracking-wider border-b border-white/10">
                        <th class="text-left py-3 px-4">#</th>
                        <th class="text-left py-3 px-4">Jugador</th>
                        <th class="text-center py-3 px-4">Pronósticos</th>
                        <th class="text-center py-3 px-4">Exactos</th>
                        <th class="text-center py-3 px-4">Puntos</th>
                        <th class="text-left py-3 px-4">Detalle</th>
                    </tr>
                </thead>
                <tbody>
                    ${datePlayerScores.map((p, i) => {
                        const isWinner = p.totalPoints === maxDatePoints && p.totalPoints > 0 && p.isVerified;
                        const rowClass = !p.isVerified ? 'bg-red-500/10' : (isWinner ? 'bg-yellow-500/5' : '');
                        const nameClass = !p.isVerified ? 'text-red-400 line-through' : (isWinner ? 'text-yellow-400' : '');
                        const initialsClass = !p.isVerified ? 'bg-red-600' : (isWinner ? 'bg-gradient-to-br from-yellow-500 to-amber-600' : 'bg-gray-700');
                        const pointsClass = !p.isVerified ? 'bg-red-500/20 text-red-400' : (isWinner ? 'points-5' : getPointsClass(p.totalPoints));
                        const paymentBadge = !p.isVerified ? '<span class="ml-2 text-[10px] bg-red-500/20 text-red-400 px-2 py-0.5 rounded-full font-bold">&#128683; Sin pago</span>' : '';
                        return `<tr class="border-b border-white/5 ${rowClass} hover:bg-white/5 transition">
                            <td class="py-3 px-4 font-bold ${isWinner ? 'text-yellow-400' : 'text-gray-500'}">${i + 1}</td>
                            <td class="py-3 px-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full ${initialsClass} flex items-center justify-center text-xs font-bold text-white">${p.initials}</div>
                                    <span class="font-semibold ${nameClass}">${p.name}</span>
                                    ${paymentBadge}
                                    ${isWinner ? '<span class="text-yellow-400 text-lg">&#127942;</span>' : ''}
                                </div>
                            </td>
                            <td class="py-3 px-4 text-center ${p.isVerified ? 'text-gray-400' : 'text-red-400'}">${p.partidosJugados}/${dateMatches.length}</td>
                            <td class="py-3 px-4 text-center ${p.isVerified ? 'text-yellow-400' : 'text-red-400'} font-bold">${p.exactos}</td>
                            <td class="py-3 px-4 text-center">
                                <span class="px-3 py-1 rounded-lg text-sm font-bold ${pointsClass}">${p.totalPoints}</span>
                            </td>
                            <td class="py-3 px-4">
                                <div class="flex flex-wrap gap-1">
                                    ${p.results.map(r => `
                                        <span class="text-[10px] px-2 py-0.5 rounded ${p.isVerified ? 'bg-white/5 text-gray-400' : 'bg-red-500/10 text-red-400'}" title="${r.match}: ${r.prediction} vs ${r.result} - ${r.reason}">
                                            ${r.points > 0 ? '+' : ''}${r.points}
                                        </span>
                                    `).join('')}
                                </div>
                            </td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>
    </div>`;

    html += '</div>';
    container.innerHTML = html;
}

document.addEventListener('DOMContentLoaded', loadData);
</script>
